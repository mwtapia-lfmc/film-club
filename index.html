input{width:100%;background:#fff;border:1.5px solid var(--ink);border-radius:999px;color:var(--ink);font-family:inherit;font-size:16px;padding:13px;text-align:center;letter-spacing:.2em;outline:none}
input:focus{box-shadow:0 0 0 3px rgba(254,172,0,.5)}
button{width:100%;margin-top:12px;background:var(--gold);border:1.5px solid var(--gold);border-radius:999px;color:var(--ink);font-family:'Oswald',sans-serif;font-weight:600;font-size:19px;letter-spacing:.06em;text-transform:uppercase;padding:13px;cursor:pointer}
button:hover{background:var(--ink);border-color:var(--ink);color:var(--gold)}
button:disabled{opacity:.6;cursor:wait}
label{display:flex;gap:8px;justify-content:center;align-items:center;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:#555;margin-top:18px;cursor:pointer}
.err{color:var(--paper);background:var(--ink);border-radius:8px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:9px;margin-top:14px;display:none}
.err.show{display:block}
:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
</style>

const ITER = 600000;

async function deriveKey(pw){
  const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2', salt:SALT, iterations:ITER, hash:'SHA-256'}, base, {name:'AES-GCM', length:256}, true, ['decrypt']);
}
async function tryDecrypt(key){
  const ct = Uint8Array.from(atob(CT_B64), c=>c.charCodeAt(0));
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:NONCE}, key, ct);
  document.open(); document.write(new TextDecoder().decode(pt)); document.close();
}
function showErr(msg){
  const el = document.getElementById('err');
  el.textContent = msg; el.classList.add('show');
}
async function unlock(){
  const btn = document.getElementById('go');
  if(!window.crypto || !crypto.subtle){
    showErr('This page needs https. Open the deployed link, not the local file.');
    return;
  }
  btn.disabled = true; btn.textContent = 'Checking…';
  try {
    const key = await deriveKey(document.getElementById('pw').value);
    if(document.getElementById('remember').checked){
      try {
        const raw = await crypto.subtle.exportKey('raw', key);
        localStorage.setItem('fc_key', btoa(String.fromCharCode(...new Uint8Array(raw))));
      } catch(e){ /* private browsing — skip remember, still unlock */ }
    }
    await tryDecrypt(key);
  } catch(e){
    btn.disabled = false; btn.textContent = 'Tear Ticket';
    showErr('Wrong password. No admittance.');
    document.getElementById('pw').select();
  }
}
document.getElementById('go').addEventListener('click', unlock);
document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') unlock(); });

// auto-unlock for remembered devices
(async()=>{
  if(!window.crypto || !crypto.subtle) return;
  let saved = null;
  try { saved = localStorage.getItem('fc_key'); } catch(e){ return; }
  if(!saved) return;
  try{
    const raw = Uint8Array.from(atob(saved), c=>c.charCodeAt(0));
    const key = await crypto.subtle.importKey('raw', raw, {name:'AES-GCM'}, false, ['decrypt']);
    await tryDecrypt(key);
  }catch(e){ try{ localStorage.removeItem('fc_key'); }catch(_){} }
})();
</script>
