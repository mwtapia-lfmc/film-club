<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mind Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Montserrat', sans-serif; background: #FBF8F1; color: #16140F; min-height: 100vh; }
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes reveal{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes nudge{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  @keyframes popin{0%{transform:scale(.9)}60%{transform:scale(1.06)}100%{transform:scale(1)}}
  .rise{animation:rise .45s cubic-bezier(.2,.7,.3,1) both}
  .reveal{animation:reveal .5s cubic-bezier(.2,.7,.3,1) both}
  .serif{font-family:'Fraunces',Georgia,serif}
  ::selection{background:#B5E04A;color:#16140F}
  textarea::placeholder{color:#B8B2A2}
  textarea{font-family:inherit}
  button{cursor:pointer;font-family:inherit}
  button:disabled{cursor:default}
  .sc::-webkit-scrollbar{width:7px}.sc::-webkit-scrollbar-thumb{background:#E0DACC;border-radius:4px}
  .cw{transition:transform .12s ease}
  .cw:hover{transform:translateY(-1px)}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

/* ───────────────────────────────────────────────────────────────
   SET THIS to your Render backend URL after the backend deploys.
   e.g. "https://mind-vault-backend.onrender.com"
   ─────────────────────────────────────────────────────────────── */
const API_URL = "https://mind-vault-backend.onrender.com";

const INK = "#16140F", MUTE = "#6B675C", FAINT = "#A39E90", LINE = "#E7E1D4";
const PAPER = "#FBF8F1", CARD = "#FFFFFF", LIME = "#B5E04A";
const KW = [
  { tint: "#EAF1D2", ink: "#55661B", sel: "#AFD544" },
  { tint: "#D7EEEA", ink: "#1E6E64", sel: "#46B6A8" },
  { tint: "#F6E8C6", ink: "#8A6A1E", sel: "#DDA92E" },
  { tint: "#F6DDE5", ink: "#9B3F5C", sel: "#D86F92" },
];
const EXAMPLE = "Los Feliz is the spitting capital of the world — lots of spitting sounds going on around here";
function sizeFor(w){ let h=0; for(const c of w) h+=c.charCodeAt(0); return [15,16,17,19,21,24][h%6]; }

async function api(path, body) {
  const r = await fetch(API_URL + path, {
    method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error("api " + r.status);
  return r.json();
}

/* inline icons */
const I = ({ d, s = 16, c = "currentColor", sw = 2, extra }) => (
  <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={sw}
    strokeLinecap="round" strokeLinejoin="round" style={{ display: "inline-block", verticalAlign: "middle" }}>{extra}{d && <path d={d} />}</svg>
);
const Zap = (p) => <I {...p} d="M13 2 3 14h9l-1 8 10-12h-9l1-8z" />;
const Sparkles = (p) => <I {...p} d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6L12 3z" />;
const Plus = (p) => <I {...p} d="M12 5v14M5 12h14" />;
const Check = (p) => <I {...p} d="M20 6 9 17l-5-5" />;
const X = (p) => <I {...p} d="M18 6 6 18M6 6l12 12" />;
const RotateCcw = (p) => <I {...p} extra={<path d="M3 3v5h5" />} d="M3.5 9a9 9 0 1 0 2.1-3.4L3 8" />;
const ArrowRight = (p) => <I {...p} d="M5 12h14M13 5l7 7-7 7" />;

const Label = ({ children, style }) => (
  <div style={{ fontSize: 10.5, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.22em", color: FAINT, ...style }}>{children}</div>
);

function App() {
  const [stage, setStage] = useState("input");
  const [draft, setDraft] = useState("");
  const [core, setCore] = useState("");
  const [keywords, setKeywords] = useState([]);
  const [selected, setSelected] = useState([]);
  const [breaking, setBreaking] = useState(false);
  const [colliding, setColliding] = useState(false);
  const [results, setResults] = useState(null);
  const [vault, setVault] = useState(() => { try { return JSON.parse(localStorage.getItem("mv_ideas") || "[]"); } catch (e) { return []; } });
  const [error, setError] = useState(null);
  const trayRef = useRef(null);

  useEffect(() => { try { localStorage.setItem("mv_ideas", JSON.stringify(vault)); } catch (e) {} }, [vault]);

  const breakOpen = async (text) => {
    const idea = (text ?? draft).trim();
    if (!idea) return;
    setBreaking(true); setError(null); setCore(idea); setResults(null); setSelected([]);
    try {
      const parsed = await api("/api/break", { idea });
      const kw = (parsed.keywords || []).slice(0, 4).map((k, i) => ({ word: k.word, c: KW[i % KW.length], cloud: Array.isArray(k.cloud) ? k.cloud : [] }));
      setKeywords(kw); setStage("clouds");
    } catch (e) {
      setError("couldn't reach the engine. if it's been idle, the backend may be waking up (Render cold start, ~30–60s). give it a moment and try again.");
    } finally { setBreaking(false); }
  };

  const toggle = (word, c) => setSelected((s) => {
    if (s.find((x) => x.word === word)) return s.filter((x) => x.word !== word);
    if (s.length >= 3) return s; return [...s, { word, c }];
  });

  const collide = async () => {
    if (selected.length < 2) return;
    setColliding(true); setError(null);
    if (trayRef.current) { trayRef.current.style.animation = "none"; void trayRef.current.offsetWidth; trayRef.current.style.animation = "nudge .4s"; }
    const words = selected.map((s) => s.word);
    try {
      const out = await api("/api/collide", { words, core });
      setResults({ words, ideas: Array.isArray(out.ideas) ? out.ideas : [] });
    } catch (e) { setError("collision fizzled. try again."); }
    finally { setColliding(false); }
  };

  const saveIdea = (i) => setVault((v) => (v.includes(i) ? v : [i, ...v]));
  const dropIdea = (i) => setVault((v) => v.filter((x) => x !== i));
  const reset = () => { setStage("input"); setDraft(""); setCore(""); setKeywords([]); setSelected([]); setResults(null); setError(null); };

  return (
    <div style={{ maxWidth: 1080, margin: "0 auto", padding: "34px 28px 60px" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12, borderBottom: "1px solid " + LINE, paddingBottom: 18, marginBottom: 34 }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 12 }}>
          <span className="serif" style={{ fontSize: 22, fontWeight: 600, letterSpacing: "-0.01em" }}>Mind Vault</span>
          <Label style={{ paddingBottom: 2 }}>collision engine</Label>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <Label>{vault.length} idea{vault.length === 1 ? "" : "s"} stored</Label>
          <span style={{ width: 28, height: 6, borderRadius: 3, background: vault.length ? LIME : LINE }} />
        </div>
      </div>

      <div style={{ display: "flex", gap: 44, flexWrap: "wrap" }}>
        <div style={{ flex: "1 1 440px", minWidth: 0 }}>
          {stage === "input" && (
            <div className="rise">
              <Label style={{ marginBottom: 16 }}>what's the idea?</Label>
              <textarea value={draft} onChange={(e) => setDraft(e.target.value)} rows={3} autoFocus
                placeholder="a half-formed meme idea. a sentence. a hunch you can't shake." className="serif"
                style={{ width: "100%", background: CARD, border: "1px solid " + LINE, borderRadius: 14, outline: "none", padding: "22px 24px", fontSize: 24, lineHeight: 1.5, color: INK, resize: "none", boxShadow: "0 1px 2px rgba(20,18,12,.03)" }}
                onFocus={(e) => (e.target.style.borderColor = LIME)} onBlur={(e) => (e.target.style.borderColor = LINE)} />
              <div style={{ display: "flex", alignItems: "center", gap: 18, marginTop: 20, flexWrap: "wrap" }}>
                <button onClick={() => breakOpen()} disabled={breaking || !draft.trim()}
                  style={{ padding: "13px 26px", borderRadius: 11, border: "none", fontWeight: 700, fontSize: 14, background: LIME, color: INK, display: "flex", alignItems: "center", gap: 8, opacity: breaking || !draft.trim() ? 0.4 : 1 }}>
                  {breaking ? "breaking open…" : <>Break it open <Zap s={15} c={INK} /></>}
                </button>
                <button onClick={() => setDraft(EXAMPLE)} style={{ background: "none", border: "none", color: MUTE, fontSize: 13, fontWeight: 500 }}>try the Los Feliz one →</button>
              </div>
              {error && <div style={{ color: "#B4453A", fontSize: 14, marginTop: 14, lineHeight: 1.5, maxWidth: 480 }}>{error}</div>}
              <p style={{ color: MUTE, fontSize: 14.5, lineHeight: 1.65, marginTop: 38, maxWidth: 480 }}>
                Break it into keyword clouds, tap words from different clouds, and smash them together. New ideas fall out of the collisions — the ones worth keeping go in the vault.
              </p>
            </div>
          )}

          {stage === "clouds" && (
            <div className="rise">
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 16, marginBottom: 30 }}>
                <div style={{ borderLeft: "3px solid " + LIME, paddingLeft: 16 }}>
                  <Label style={{ marginBottom: 8 }}>core idea</Label>
                  <div className="serif" style={{ fontSize: 23, lineHeight: 1.35, fontWeight: 500, maxWidth: "42ch" }}>{core}</div>
                </div>
                <button onClick={reset} style={{ background: "none", border: "none", color: MUTE, fontSize: 12.5, fontWeight: 600, display: "flex", alignItems: "center", gap: 5, flexShrink: 0 }}><RotateCcw s={13} /> new</button>
              </div>

              <div style={{ display: "flex", flexWrap: "wrap", gap: 16, marginBottom: 16 }}>
                {keywords.map((k) => (
                  <span key={k.word} style={{ display: "flex", alignItems: "center", gap: 7, fontSize: 13, fontWeight: 600, color: k.c.ink }}>
                    <span style={{ width: 9, height: 9, borderRadius: 99, background: k.c.sel }} />{k.word}
                  </span>
                ))}
              </div>

              <div style={{ background: CARD, border: "1px solid " + LINE, borderRadius: 16, padding: "30px 24px", textAlign: "center", marginBottom: 22, lineHeight: 2.5, boxShadow: "0 1px 2px rgba(20,18,12,.03)" }}>
                {keywords.flatMap((k) => k.cloud.map((w) => {
                  const sel = selected.find((s) => s.word === w);
                  return (
                    <button key={k.word + w} onClick={() => toggle(w, k.c)} className="cw"
                      style={{ display: "inline-block", margin: "3px 5px", fontSize: sizeFor(w), fontWeight: sel ? 700 : 500, border: "none", borderRadius: 9, padding: sel ? "4px 13px" : "4px 11px", background: sel ? k.c.sel : k.c.tint, color: sel ? "#1d1c14" : k.c.ink, boxShadow: sel ? "0 2px 8px rgba(20,18,12,.14)" : "none", animation: sel ? "popin .22s both" : "none" }}>{w}</button>
                  );
                }))}
              </div>

              <div ref={trayRef} style={{ borderRadius: 13, border: "1.5px dashed " + (selected.length >= 2 ? LIME : LINE), background: selected.length ? CARD : "transparent", padding: 16, marginBottom: 6, minHeight: 66, display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap", transition: "border-color .2s" }}>
                {selected.length === 0 ? (
                  <span style={{ color: MUTE, fontSize: 14 }}>Tap 2–3 words above — ideally across different clouds — then smash them.</span>
                ) : (
                  <>
                    {selected.map((s, i) => (
                      <React.Fragment key={s.word}>
                        {i > 0 && <Zap s={15} c={FAINT} />}
                        <span style={{ fontSize: 15, fontWeight: 700, padding: "7px 13px", borderRadius: 9, background: s.c.sel, color: "#1d1c14", display: "flex", alignItems: "center", gap: 7 }}>
                          {s.word}<button onClick={() => toggle(s.word, s.c)} style={{ background: "none", border: "none", padding: 0, display: "flex" }}><X s={13} c="#1d1c14" /></button>
                        </span>
                      </React.Fragment>
                    ))}
                    <button onClick={collide} disabled={selected.length < 2 || colliding}
                      style={{ marginLeft: "auto", padding: "11px 22px", borderRadius: 10, fontWeight: 700, fontSize: 14, border: "1.5px solid " + INK, background: INK, color: "#FBF8F1", display: "flex", alignItems: "center", gap: 8, opacity: selected.length < 2 || colliding ? 0.4 : 1 }}>
                      {colliding ? "colliding…" : <>Collide <Sparkles s={14} c="#FBF8F1" /></>}
                    </button>
                  </>
                )}
              </div>
              {error && <div style={{ color: "#B4453A", fontSize: 14, marginTop: 8 }}>{error}</div>}

              {results && (
                <div className="reveal" style={{ marginTop: 30 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 9, marginBottom: 14, fontSize: 13, color: MUTE, fontWeight: 600, flexWrap: "wrap" }}>
                    {results.words.map((w, i) => (<React.Fragment key={w}>{i > 0 && <span style={{ color: LIME }}>×</span>}<span>{w}</span></React.Fragment>))}
                    <span style={{ color: FAINT, fontWeight: 500 }}>fell out:</span>
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 11 }}>
                    {results.ideas.map((idea, i) => {
                      const saved = vault.includes(idea);
                      return (
                        <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 14, background: CARD, border: "1px solid " + LINE, borderRadius: 13, padding: "16px 18px" }}>
                          <p className="serif" style={{ flex: 1, fontSize: 18, lineHeight: 1.45, margin: 0, color: INK }}>{idea}</p>
                          <button onClick={() => saveIdea(idea)} title="vault this idea" style={{ flexShrink: 0, marginTop: 2, padding: 7, borderRadius: 9, border: "1px solid " + (saved ? LIME : LINE), background: saved ? LIME : "#FFF", color: INK, display: "flex" }}>
                            {saved ? <Check s={15} c={INK} /> : <Plus s={15} c={INK} />}
                          </button>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>

        <div style={{ width: 290, flexShrink: 0 }}>
          <div style={{ position: "sticky", top: 28 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
              <Label>idea vault</Label>
              <span style={{ fontSize: 12.5, fontWeight: 700, padding: "2px 9px", borderRadius: 6, background: vault.length ? LIME : "#EFEADD", color: INK }}>{vault.length}</span>
            </div>
            <div className="sc" style={{ background: CARD, border: "1px solid " + LINE, borderRadius: 14, padding: 14, minHeight: 150, maxHeight: "66vh", overflowY: "auto", boxShadow: "0 1px 2px rgba(20,18,12,.03)" }}>
              {vault.length === 0 ? (
                <p style={{ color: MUTE, fontSize: 13.5, lineHeight: 1.65, margin: 0 }}>Empty for now. Collide some words and save the lines that could actually become memes.</p>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {vault.map((idea) => (
                    <div key={idea} className="rise" style={{ display: "flex", alignItems: "flex-start", gap: 9, borderLeft: "2px solid " + LIME, paddingLeft: 11, paddingTop: 2, paddingBottom: 2 }}>
                      <p className="serif" style={{ flex: 1, fontSize: 14.5, lineHeight: 1.4, margin: 0, color: INK }}>{idea}</p>
                      <button onClick={() => dropIdea(idea)} style={{ background: "none", border: "none", padding: 0, display: "flex", color: FAINT }}><X s={13} /></button>
                    </div>
                  ))}
                </div>
              )}
            </div>
            {vault.length > 0 && (
              <div style={{ display: "flex", alignItems: "center", gap: 5, marginTop: 10, fontSize: 11.5, color: MUTE }}>
                Candidate memes. Next stop <ArrowRight s={11} /> the Meme Vault.
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
